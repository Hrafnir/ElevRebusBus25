<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elev - Rebus Platform</title>
  <link rel="stylesheet" href="../assets/app.css">
</head>
<body>
  <div id="notification-stack" class="notification-stack" aria-live="polite"></div>
  <main class="shell">
    <header class="app-header">
      <div>
        <p class="eyebrow">Elev</p>
        <h1>Min rebus</h1>
        <p>Logg inn med brukernavn og passord fra læreren.</p>
      </div>
      <a class="button ghost" href="../">Forside</a>
    </header>

    <section id="login-panel" class="panel stack">
      <h2>Logg inn</h2>
      <label><span>Brukernavn</span><input id="username" value="demo"></label>
      <label><span>Kode</span><input id="password" value="demo" autocomplete="off"></label>
      <button id="login-button">Start</button>
    </section>

    <section id="app-panel" class="panel stack" hidden>
      <div>
        <h2 id="rebus-title"></h2>
        <p id="student-name" class="muted"></p>
      </div>
      <div class="map-picker" id="student-map">
        Elevkart lastes når posisjon er tillatt.
      </div>
      <p id="location-status" class="muted">Posisjon er ikke sendt ennå.</p>
      <section id="student-messages" class="message-panel"></section>
      <div id="task-list" class="list"></div>
    </section>
  </main>
  <script src="../config.js"></script>
  <script src="app.js"></script>
</body>
</html>
